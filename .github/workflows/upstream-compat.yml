name: Upstream Compatibility

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:
    inputs:
      version:
        description: "toolregistry version to test against (e.g. 0.6.0)"
        required: false

jobs:
  test-against-upstream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies with latest toolregistry
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          # Upgrade toolregistry to the version that triggered this, or latest
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          if [ -n "$VERSION" ]; then
            VERSION="${VERSION#v}"
            pip install "toolregistry==$VERSION"
          else
            pip install --upgrade toolregistry
          fi
          pip show toolregistry | grep Version

      - name: Run tests
        run: pytest tests/ -v --tb=short
