site_name: ToolRegistry Server
site_description: 定义自定义工具，通过 OpenAPI 或 MCP 接口提供服务
site_author: Peng Ding
site_url: https://toolregistry-server.readthedocs.io/zh/
repo_name: Oaklight/toolregistry-server
repo_url: https://github.com/Oaklight/toolregistry-server
copyright: Copyright &copy; 2026 Peng Ding

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统偏好
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/toolregistry-server
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry-server/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

nav:
  - 首页: index.md
  - 使用指南:
      - 安装: usage/installation.md
      - 快速开始: usage/quickstart.md
      - 配置: usage/configuration.md
      - 认证: usage/authentication.md
  - 适配器:
      - adapters/index.md
      - OpenAPI 适配器: adapters/openapi.md
      - MCP 适配器: adapters/mcp.md
  - 命令行工具:
      - cli/index.md
  - API 参考:
      - api/index.md
      - 核心:
          - RouteTable: api/core/route_table.md
      - OpenAPI: api/openapi.md
      - MCP: api/mcp.md
      - 认证: api/auth.md
  - 生态系统: ecosystem.md
  - 更新日志: changelog.md
  - ToolRegistry: https://toolregistry.readthedocs.io/
  - Hub 工具: https://toolregistry-hub.readthedocs.io/
