site_name: ToolRegistry Server
site_description: Define custom tools and serve them via OpenAPI or MCP interfaces
site_author: Peng Ding
site_url: https://toolregistry-server.readthedocs.io/en/
repo_name: Oaklight/toolregistry-server
repo_url: https://github.com/Oaklight/toolregistry-server
copyright: Copyright &copy; 2026 Peng Ding

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/toolregistry-server
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry-server/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

nav:
  - Home: index.md
  - Usage:
      - Installation: usage/installation.md
      - Quick Start: usage/quickstart.md
      - Configuration: usage/configuration.md
      - Authentication: usage/authentication.md
  - Adapters:
      - adapters/index.md
      - OpenAPI Adapter: adapters/openapi.md
      - MCP Adapter: adapters/mcp.md
  - CLI:
      - cli/index.md
  - API Reference:
      - api/index.md
      - Core:
          - RouteTable: api/core/route_table.md
      - OpenAPI: api/openapi.md
      - MCP: api/mcp.md
      - Authentication: api/auth.md
  - Ecosystem: ecosystem.md
  - Changelog: changelog.md
  - ToolRegistry: https://toolregistry.readthedocs.io/
  - Hub Tools: https://toolregistry-hub.readthedocs.io/
